<!DOCTYPE html>
<html>
<head>
  <title>Select Design</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h2 {
      margin-top: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      height: 200px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>Select a Design</h2>

<div class="container" id="designContainer"></div>

<script>
  // protect page
  if (!localStorage.getItem("userId")) {
    window.location.href = "login.html";
  }

  const designs = [
    { name: "Kurti", img: "../images/kurthi.jpeg" },
    { name: "Saree", img: "../images/halfsaree.jpeg" },
    { name: "Frock", img: "../images/frock.jpeg" },
    { name: "Gown", img: "https://via.placeholder.com/200?text=Gown" },
    { name: "Top", img: "https://via.placeholder.com/200?text=Top" },
    { name: "Skirt", img: "https://via.placeholder.com/200?text=Skirt" }
  ];

  const container = document.getElementById("designContainer");

  designs.forEach(design => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${design.img}" />
      <p>${design.name}</p>
    `;

    card.onclick = () => {
        localStorage.setItem("selectedProduct", JSON.stringify({
            name: design.name,
            img: design.img
        }));
      window.location.href = "studio.html";
    };

    container.appendChild(card);
  });
</script>

</body>
</html>
