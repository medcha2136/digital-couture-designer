<!DOCTYPE html>
<html>
<head>
    <title>Dress Templates</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
        }
        .card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }
        img {
            width: 100%;
            height: 200px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h2>Trending Dress Designs</h2>

<div class="container" id="dressContainer"></div>

<script>
    const dresses = [
        "https://via.placeholder.com/200x200?text=Kurti",
        "https://via.placeholder.com/200x200?text=Saree",
        "https://via.placeholder.com/200x200?text=Lehenga",
        "https://via.placeholder.com/200x200?text=Gown",
        "https://via.placeholder.com/200x200?text=Top",
        "https://via.placeholder.com/200x200?text=Skirt",
        "https://via.placeholder.com/200x200?text=Salwar",
        "https://via.placeholder.com/200x200?text=Jacket"
    ];

    function getRandomDresses() {
        let shuffled = dresses.sort(() => 0.5 - Math.random());
        return shuffled.slice(0, 6); // show 6 random dresses
    }

    function displayDresses() {
        const container = document.getElementById("dressContainer");
        const randomDresses = getRandomDresses();

        container.innerHTML = "";

        randomDresses.forEach(dress => {
            container.innerHTML += `
                <div class="card">
                    <img src="${dress}" />
                    <p>Custom Design</p>
                </div>
            `;
        });
    }

    displayDresses();
</script>

</body>
</html>
