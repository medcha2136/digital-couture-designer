<!DOCTYPE html>
<html>
<head>
<title>Digital Couture Designer- Login</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
body{
margin:0;
font-family:Segoe UI, Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* NEW LOGO IMAGE BACKGROUND */
background:
linear-gradient(rgba(241,247,245,.75),rgba(241,247,245,.75)),
url("../finallogo.jpg");

background-size:110%;
background-position:center;
background-repeat:no-repeat;
}

.box{
background:white;
padding:45px;
width:420px;
border-radius:14px;
box-shadow:0 12px 30px rgba(0,0,0,.15);
}

h2{
text-align:center;
color:#2a9d8f;
margin-bottom:25px;
font-family:'Great Vibes', cursive;
font-size:42px;
font-weight:normal;
letter-spacing:1px;
}

input,button{
width:100%;
padding:14px;
margin:12px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#2a9d8f;
color:white;
border:none;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#21867a;
}

#otpBox{
display:none;
}

p{
text-align:center;
color:red;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>Digital Couture Designer</h2>

<input type="tel" id="phone" placeholder="Enter Phone Number">

<button onclick="sendOTP()">Send OTP</button>

<div id="otpBox">
<input type="number" id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify OTP</button>
</div>

<p id="msg"></p>

</div>

<script>

let generatedOTP="";

function sendOTP(){

let phone=document.getElementById("phone").value;

if(phone.length!=10){
document.getElementById("msg").innerText="Enter valid 10 digit number";
return;
}

generatedOTP=Math.floor(1000+Math.random()*9000);

alert("Demo OTP: "+generatedOTP);

document.getElementById("otpBox").style.display="block";
document.getElementById("msg").innerText="OTP Sent";
}

async function verifyOTP(){

  let otp = document.getElementById("otp").value;

  if(otp == generatedOTP){

    const phone = document.getElementById("phone").value;

    try {
      const response = await fetch("http://localhost:8080/api/user/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          phone: phone
        })
      });

      const data = await response.json();

      // 🔥 STORE BOTH
      localStorage.setItem("userId", data.id);
      localStorage.setItem("userPhone", data.phone);

      // 🔥 REDIRECT
      window.location.href = "dashboard.html";

    } catch (error) {
      console.error("Error:", error);
    }

  } else {
    document.getElementById("msg").innerText = "Invalid OTP";
  }
}
/* 🔥 ENTER KEY FUNCTIONALITY */

// When pressing ENTER in phone input → send OTP
document.getElementById("phone").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    sendOTP();
  }
});

// When pressing ENTER in OTP input → verify OTP
document.getElementById("otp").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    verifyOTP();
  }
});

</script>

</body>
</html>
