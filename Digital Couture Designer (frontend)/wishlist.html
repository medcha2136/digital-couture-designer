<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist - Digital Couture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #146c63;
    --brand-dark: #0f574f;
    --ink: #1f2b30;
    --muted: #62717a;
    --bg: #f3f8fa;
    --line: #dbe7ea;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Poppins", "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at 10% 10%, #d8eeea 0%, transparent 28%),
      radial-gradient(circle at 88% 85%, #dce9fa 0%, transparent 30%),
      var(--bg);
    color: var(--ink);
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(243, 248, 250, 0.94);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }

  .topbar-inner {
    width: min(1150px, 94vw);
    margin: 0 auto;
    min-height: 70px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  .title {
    font-weight: 600;
    font-size: clamp(1.1rem, 2.3vw, 1.5rem);
    color: var(--brand-dark);
  }

  .top-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    border-radius: 999px;
    padding: 8px 13px;
    font-weight: 500;
    cursor: pointer;
  }

  .btn.primary {
    border: 0;
    color: #fff;
    background: linear-gradient(90deg, var(--brand), var(--brand-dark));
  }

  .container {
    width: min(1150px, 94vw);
    margin: 24px auto 40px;
  }

  .summary {
    margin: 0 0 14px;
    color: var(--muted);
    font-size: 0.92rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }

  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 12px 26px rgba(15, 87, 79, 0.08);
  }

  .card img {
    width: 100%;
    height: 280px;
    object-fit: cover;
    display: block;
  }

  .content {
    padding: 12px 14px 14px;
  }

  .content h3 {
    margin: 0;
    font-size: 1rem;
  }

  .price {
    margin: 8px 0 12px;
    color: var(--brand-dark);
    font-weight: 600;
  }

  .category {
    margin: 0 0 8px;
    color: var(--muted);
    font-size: 0.86rem;
  }

  .actions {
    display: grid;
    gap: 8px;
  }

  .actions button {
    width: 100%;
    border: 0;
    border-radius: 10px;
    padding: 10px;
    font-weight: 600;
    cursor: pointer;
  }

  .move-btn {
    background: linear-gradient(90deg, var(--brand), var(--brand-dark));
    color: #fff;
  }

  .remove-btn {
    background: #fff;
    color: #ff3f6c;
    border: 1px solid #ff3f6c !important;
  }

  .empty {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 30px 16px;
    text-align: center;
    color: var(--muted);
  }

  .toast {
    position: fixed;
    right: 16px;
    bottom: 16px;
    background: #0e3f3a;
    color: #fff;
    padding: 10px 14px;
    border-radius: 10px;
    opacity: 0;
    transition: opacity .2s ease;
    pointer-events: none;
  }

  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="title">My Wishlist</div>
      <div class="top-actions">
        <button class="btn" onclick="location.href='Dashboard.html'">Dashboard</button>
        <button class="btn" onclick="location.href='products.html'">Products</button>
        <button class="btn primary" onclick="location.href='cart.html'">Go to Cart</button>
      </div>
    </div>
  </header>

  <main class="container">
    <p class="summary" id="summary"></p>
    <div class="grid" id="wishlistGrid"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    if (!localStorage.getItem("userPhone")) {
      window.location.href = "login.html";
    }

    const grid = document.getElementById("wishlistGrid");
    const summary = document.getElementById("summary");

    function getWishlist() {
      return JSON.parse(localStorage.getItem("wishlistItems") || "[]");
    }

    function setWishlist(items) {
      localStorage.setItem("wishlistItems", JSON.stringify(items));
    }

    function getCart() {
      return JSON.parse(localStorage.getItem("cartItems") || "[]");
    }

    function setCart(items) {
      localStorage.setItem("cartItems", JSON.stringify(items));
    }

    function renderWishlist() {
      const wishlist = getWishlist();
      summary.innerText = `${wishlist.length} item(s) in your wishlist`;
      grid.innerHTML = "";

      if (wishlist.length === 0) {
        grid.innerHTML = `
          <section class="empty">
            <h3 style="margin:0 0 6px; color:#0f574f;">Wishlist is empty</h3>
            <p style="margin:0 0 12px;">Save styles you love and move them to cart anytime.</p>
            <button class="btn primary" onclick="location.href='products.html'">Browse Products</button>
          </section>
        `;
        return;
      }

      wishlist.forEach((item, index) => {
        grid.innerHTML += `
          <article class="card">
            <img src="${item.image}" alt="${item.name}">
            <div class="content">
              <h3>${item.name}</h3>
              <p class="category">${item.category}</p>
              <p class="price">INR ${item.price}</p>
              <div class="actions">
                <button class="move-btn" type="button" onclick="moveToCart(${index})">Move to Cart</button>
                <button class="remove-btn" type="button" onclick="removeFromWishlist(${index})">Remove</button>
              </div>
            </div>
          </article>
        `;
      });
    }

    function moveToCart(index) {
      const wishlist = getWishlist();
      const item = wishlist[index];
      if (!item) return;

      const cart = getCart();
      const existing = cart.find(c => c.name === item.name && c.category === item.category);
      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({
          img: item.image,
          name: item.name,
          price: item.price,
          category: item.category,
          qty: 1,
          addedAt: new Date().toLocaleString()
        });
      }

      wishlist.splice(index, 1);
      setCart(cart);
      setWishlist(wishlist);
      showToast("Moved to cart");
      renderWishlist();
    }

    function removeFromWishlist(index) {
      const wishlist = getWishlist();
      wishlist.splice(index, 1);
      setWishlist(wishlist);
      showToast("Removed from wishlist");
      renderWishlist();
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.innerText = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1600);
    }

    window.moveToCart = moveToCart;
    window.removeFromWishlist = removeFromWishlist;
    renderWishlist();
  </script>
</body>
</html>
