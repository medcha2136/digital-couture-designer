<!DOCTYPE html>
<html>
<head>
<title>Measurements</title>

<style>
body{font-family:Arial;background:#f4f7fa;padding:40px;}
.box{background:white;padding:25px;width:300px;margin:auto;border-radius:10px;}
input,button{width:100%;padding:10px;margin:10px 0;}
</style>
</head>

<body>

<div class="box">

<h3>Body Measurements</h3>

<input id="chest" placeholder="Chest">
<input id="waist" placeholder="Waist">
<input id="hip" placeholder="Hip">

<button onclick="save()">Save</button>

</div>

<script>

function save(){
let data={
chest:chest.value,
waist:waist.value,
hip:hip.value
};

localStorage.setItem("measurements",JSON.stringify(data));
alert("Saved");
}

</script>

</body>
</html>
