down image <!DOCTYPE html>
<html>
<head>
<title>Measurements - Digital Couture Design</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg,#f4f7fa,#e0f2f1);
}

/* Header */
.header{
    background:#2a9d8f;
    color:white;
    padding:20px 40px;
    font-size:22px;
    font-weight:bold;
}

/* Main container */
.container{
    padding:40px;
}

/* Card */
.card{
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
    max-width:1000px;
    margin:auto;
}

/* Grid layout */
.form-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:25px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    font-weight:600;
    margin-bottom:6px;
    color:#444;
}

input{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
    transition:0.3s;
}

input:focus{
    border-color:#2a9d8f;
    outline:none;
    box-shadow:0 0 5px rgba(42,157,143,0.3);
}

/* Submit button */
.submit-btn{
    margin-top:30px;
    width:100%;
    padding:14px;
    background:#2a9d8f;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn:hover{
    background:#21867a;
}

/* Measurement Guide Section */
.guide-section{
    margin-top:60px;
    text-align:center;
}

.guide-section img{
    width:90%;
    max-width:1100px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="header">
    Digital Couture Design - Body Measurements
</div>

<div class="container">

<div class="card">

<div class="form-grid">

<div class="form-group">
<label>Name</label>
<input type="text" id="name">
</div>

<div class="form-group">
<label>Chest (in inches)</label>
<input type="number" id="chest">
</div>

<div class="form-group">
<label>Waist (in inches)</label>
<input type="number" id="waist">
</div>

<div class="form-group">
<label>Hip (in inches)</label>
<input type="number" id="hip">
</div>

<div class="form-group">
<label>Neck (in inches)</label>
<input type="number" id="neck">
</div>

<div class="form-group">
<label>Shoulder (in inches)</label>
<input type="number" id="shoulder">
</div>

<div class="form-group">
<label>Elbow (in inches)</label>
<input type="number" id="elbow">
</div>

<div class="form-group">
<label>Armhole (in inches)</label>
<input type="number" id="armhole">
</div>

<div class="form-group">
<label>Length (in inches)</label>
<input type="number" id="length">
</div>

<div class="form-group">
<label>Thigh (in inches)</label>
<input type="number" id="thigh">
</div>

</div>

<button class="submit-btn" onclick="save()">Submit Measurements</button>

</div>

<!-- Measurement Guide Appears When Scrolling Down -->
<div class="guide-section">
    <h2 style="color:#2a9d8f;">How To Measure Properly</h2>
    <img src="C:\Users\HP\OneDrive\ドキュメント\Custom Office Templates\measurepic.jpeg" alt="Measurement Guide">
</div>

</div>

<script>
function save(){

let data={
name:name.value,
chest:chest.value,
waist:waist.value,
hip:hip.value,
neck:neck.value,
shoulder:shoulder.value,
elbow:elbow.value,
armhole:armhole.value,
length:length.value,
thigh:thigh.value
};

localStorage.setItem("measurements",JSON.stringify(data));

alert("Measurements Saved Successfully!");
}
</script>

</body>
</html>
